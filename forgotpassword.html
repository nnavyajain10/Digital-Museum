
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* animated glow */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(201,164,92,0.15), transparent 60%);
      animation: moveBg 8s infinite linear;
    }

    @keyframes moveBg {
      0% { transform: translate(-25%, -25%); }
      50% { transform: translate(-10%, -10%); }
      100% { transform: translate(-25%, -25%); }
    }

    .box {
      position: relative;
      z-index: 2;
      width: 360px;
      padding: 35px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      color: #fff;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);

      opacity: 0;
      transform: translateY(40px);
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 25px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: 0.3s;
    }

    input::placeholder {
      color: #bbb;
    }

    input:focus {
      box-shadow: 0 0 12px #c9a45c;
      transform: scale(1.03);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(45deg, #c9a45c, #e6c97a);
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #c9a45c;
    }

    #msg {
      margin-top: 10px;
      font-size: 12px;
      color: #ff6b6b;
      display: none;
    }

    .back {
      margin-top: 12px;
      font-size: 12px;
      color: #bbb;
      cursor: pointer;
    }

    .back:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Reset Password</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="newPass" placeholder="New Password">
  <input type="password" id="confirmPass" placeholder="Confirm Password">

  <button onclick="resetPassword()">Update Password</button>

  <p id="msg"></p>

  <!-- Back link -->
  <p class="back" onclick="goBack()">← Back to Login</p>
</div>

<script>
function resetPassword() {

  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("newPass").value.trim();
  let confirm = document.getElementById("confirmPass").value.trim();
  let msg = document.getElementById("msg");

  // Empty fields
  if (email === "" || pass === "" || confirm === "") {
    msg.innerText = "All fields are required";
    msg.style.display = "block";
    return;
  }

  // FIRST check password match
  if (pass !== confirm) {
    msg.innerText = "Passwords do not match";
    msg.style.display = "block";
    return;
  }

  // Minimum length
  if (pass.length < 6) {
    msg.innerText =
      "Password must be at least 6 characters long";
    msg.style.display = "block";
    return;
  }

  // Uppercase check
  let upperCasePattern = /[A-Z]/;

  if (!upperCasePattern.test(pass)) {
    msg.innerText =
      "Password must contain at least one uppercase letter";
    msg.style.display = "block";
    return;
  }

  // Lowercase check
  let lowerCasePattern = /[a-z]/;

  if (!lowerCasePattern.test(pass)) {
    msg.innerText =
      "Password must contain at least one lowercase letter";
    msg.style.display = "block";
    return;
  }

  // Special character check
  let specialCharPattern = /[!@#$%^&*(),.?":{}|<>]/;

  if (!specialCharPattern.test(pass)) {
    msg.innerText =
      "Password must contain at least one special character";
    msg.style.display = "block";
    return;
  }

  // Success
  msg.style.color = "#4CAF50";
  msg.innerText = "Password Updated Successfully!";
  msg.style.display = "block";

  setTimeout(() => {
    window.location.href = "project8(2.0).html";
  }, 2000);
}


function goBack() {
  window.location.href = "project8(2.0).html";
}

</script>

</body>
</html>
