<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Museum</title>
  <link rel="stylesheet" href="project1(2.0).css">
</head>
<body>

  <header>
    <h1>ANTIQUS</h1>
  </header>

  <main>
    <section class="hero">
      <div class="hero-text">
        <h2>Welcome To<br>The<br>Digital Museum</h2>

        <div class="buttons">
          <a href="project2(2.0).html" class="btn explore">EXPLORE</a>
          <a href="project3(2.0).html" class="btn about">
             <span class="play-icon">▶</span> ABOUT MUSEUM
         </a>
        </div>
      </div>
    </section>

    <!-- TAGLINE SECTION -->
    <section class="scroll-taglines">
      <div class="tagline-container">
        <h2 class="tagline">Step Into The Past</h2>
        <h2 class="tagline">Witness The Rise Of Civilizations</h2>
        <h2 class="tagline">Relive The Moments That Changed The World</h2>
      </div>
    </section>

    <!-- CINEMATIC IMAGE SECTION -->
    <section class="cinematic-section">
      <div class="cinematic-content">
        <h2>Where History Was Born</h2>
        <p>From ancient civilizations to timeless legacies...</p>
      </div>
    </section>



    <section class="gallery-section">
  <h2 class="gallery-title">You Are Not Viewing History. You Are Entering It.</h2>

  <div class="gallery">
    <div class="card">
      <img src="https://i.pinimg.com/1200x/a6/52/f7/a652f79e220e0b328a33b7a834df976a.jpg" alt="">
      
    </div>

    <div class="card">
      <img src="https://i.pinimg.com/1200x/d6/7a/ee/d67aee21383ce426bc8484591fb785bc.jpg" alt="">
      
    </div>

    <div class="card">
      <img src="https://i.pinimg.com/1200x/95/c7/86/95c7863763cfca6468c6ecb17ed59bcb.jpg" alt="">
      
    </div>

    <div class="card">
      <img src="https://i.pinimg.com/1200x/cf/3a/6e/cf3a6e96882bac4047cbd59265f20a3c.jpg" alt="">
      
    </div>
  </div>
</section>

  </main>

  <script>
    // Parallax effect (mouse move)
    document.addEventListener("mousemove", (e) => {
      const x = (window.innerWidth - e.pageX * 2) / 100;
      const y = (window.innerHeight - e.pageY * 2) / 100;
      document.body.style.backgroundPosition = `${x}px ${y}px`;
    });

    // Button ripple effect
    document.querySelectorAll(".btn").forEach(btn => {
      btn.addEventListener("click", function (e) {
        let x = e.clientX - e.target.offsetLeft;
        let y = e.clientY - e.target.offsetTop;

        let ripple = document.createElement("span");
        ripple.style.left = x + "px";
        ripple.style.top = y + "px";
        ripple.classList.add("ripple");

        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });

    // TAGLINE WORD ANIMATION
    const taglines = document.querySelectorAll(".tagline");

    taglines.forEach(tag => {
      const words = tag.innerText.split(" ");
      tag.innerHTML = words.map(word => `<span class="word">${word}</span>`).join(" ");
    });

    function revealTaglines() {
      const triggerBottom = window.innerHeight * 0.85;

      taglines.forEach(tag => {
        const tagTop = tag.getBoundingClientRect().top;

        if (tagTop < triggerBottom) {
          tag.classList.add("show");

          const words = tag.querySelectorAll(".word");
          words.forEach((word, index) => {
            setTimeout(() => {
              word.style.opacity = 1;
              word.style.transform = "translateY(0)";
            }, index * 150);
          });
        }
      });
    }

    window.addEventListener("scroll", revealTaglines);

    // CINEMATIC SECTION REVEAL
    const cinematic = document.querySelector(".cinematic-content");

    function revealCinematic() {
      const triggerBottom = window.innerHeight * 0.85;
      const top = cinematic.getBoundingClientRect().top;

      if (top < triggerBottom) {
        cinematic.classList.add("show");
      }
    }

    window.addEventListener("scroll", revealCinematic);

  </script>
</body>
</html>
